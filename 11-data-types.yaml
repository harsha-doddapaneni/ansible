- name: devops course info
  hosts: local
  vars:
    course: "DevOps with aws"
    duration: 120
    topics:
    - Linux
    - Shell
    - Ansible
    - Terraform
    - Aws
    - K8
    live: true
    tools:
      ci: jenkins
      cm: ansible
      cloud: aws
      aws:
      - Iam
      - S3
  tasks:
  - name: print course info
    ansible.builtin.debug:
      msg: "hi, iam learning {{ course }}, with duration: {{ duration }}, topics are: {{ topics }}, and live: {{ live }}, tools are: {{ tools }}"
